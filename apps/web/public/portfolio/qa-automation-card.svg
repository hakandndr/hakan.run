<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">

  <!-- Background -->
  <rect width="800" height="500" fill="#0D0D14"/>

  <!-- Terminal chrome bar -->
  <rect width="800" height="42" fill="#131320"/>
  <line x1="0" y1="42" x2="800" y2="42" stroke="#1E2030" stroke-width="1"/>
  <circle cx="20" cy="21" r="6" fill="#EF4444" fill-opacity="0.55"/>
  <circle cx="44" cy="21" r="6" fill="#FBBF24" fill-opacity="0.55"/>
  <circle cx="68" cy="21" r="6" fill="#4ADE80" fill-opacity="0.55"/>
  <text x="400" y="27" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">Playwright Tests &#x2014; Regression Suite &#x2022; CI Pipeline</text>

  <!-- Summary stats bar -->
  <rect x="0" y="42" width="800" height="44" fill="#0F0F1C"/>
  <line x1="0" y1="86" x2="800" y2="86" stroke="#1E2030" stroke-width="1"/>
  <rect x="20" y="54" width="96" height="20" rx="3" fill="#4ADE80" fill-opacity="0.1" stroke="#4ADE80" stroke-opacity="0.25" stroke-width="1"/>
  <text x="68" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ADE80">&#x2713; 48 passed</text>
  <rect x="126" y="54" width="82" height="20" rx="3" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-opacity="0.25" stroke-width="1"/>
  <text x="167" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#EF4444">&#x2717; 2 failed</text>
  <rect x="218" y="54" width="90" height="20" rx="3" fill="#6B7280" fill-opacity="0.08"/>
  <text x="263" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#6B7280">&#x25CB; 3 skipped</text>
  <text x="324" y="68" font-family="monospace" font-size="10" fill="#4B5563">14.3s</text>
  <text x="390" y="68" font-family="monospace" font-size="10" fill="#4B5563">Workers: 4</text>
  <text x="490" y="68" font-family="monospace" font-size="10" fill="#4B5563">Chromium &#x2022; Firefox &#x2022; WebKit</text>

  <!-- LEFT PANE: test output -->
  <line x1="440" y1="86" x2="440" y2="500" stroke="#1E2030" stroke-width="1"/>

  <!-- auth.spec.ts -->
  <text x="20" y="108" font-family="monospace" font-size="10" fill="#E5E7EB" font-weight="bold">auth.spec.ts</text>
  <text x="34" y="128" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; login with valid credentials</text>
  <text x="34" y="146" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; redirect after successful login</text>
  <text x="34" y="164" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; logout clears session cookie</text>
  <text x="34" y="182" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; wrong password shows error state</text>

  <!-- dashboard.spec.ts -->
  <text x="20" y="204" font-family="monospace" font-size="10" fill="#E5E7EB" font-weight="bold">dashboard.spec.ts</text>
  <text x="34" y="222" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; renders dashboard on load</text>
  <text x="34" y="240" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; metric cards display correct values</text>
  <text x="34" y="258" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; chart component renders</text>

  <!-- forms.spec.ts -->
  <text x="20" y="280" font-family="monospace" font-size="10" fill="#E5E7EB" font-weight="bold">forms.spec.ts</text>
  <text x="34" y="298" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; form submission returns success</text>
  <text x="34" y="316" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; required fields block submission</text>
  <text x="34" y="334" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; email format validated client-side</text>

  <!-- navigation.spec.ts FAILED -->
  <text x="20" y="356" font-family="monospace" font-size="10" fill="#EF4444" font-weight="bold">navigation.spec.ts</text>
  <text x="34" y="374" font-family="monospace" font-size="9" fill="#EF4444">&#x2717; sidebar collapse animation</text>
  <text x="48" y="390" font-family="monospace" font-size="8" fill="#6B7280">Error: element not visible after 5000ms</text>
  <text x="48" y="404" font-family="monospace" font-size="8" fill="#4B5563">locator('.sidebar-toggle').click()</text>
  <text x="34" y="422" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; breadcrumb renders correctly</text>

  <!-- api.spec.ts -->
  <text x="20" y="444" font-family="monospace" font-size="10" fill="#E5E7EB" font-weight="bold">api.spec.ts</text>
  <text x="34" y="462" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; GET /users returns 200</text>
  <text x="34" y="480" font-family="monospace" font-size="9" fill="#4ADE80">&#x2713; POST /auth returns 201</text>

  <!-- RIGHT PANE: browser preview -->
  <!-- Browser chrome -->
  <rect x="440" y="86" width="360" height="36" fill="#131320"/>
  <line x1="440" y1="122" x2="800" y2="122" stroke="#1E2030" stroke-width="1"/>
  <circle cx="460" cy="104" r="4" fill="#EF4444" fill-opacity="0.4"/>
  <circle cx="478" cy="104" r="4" fill="#FBBF24" fill-opacity="0.4"/>
  <circle cx="496" cy="104" r="4" fill="#4ADE80" fill-opacity="0.4"/>
  <rect x="514" y="95" width="222" height="18" rx="3" fill="#0C0D14" stroke="#374151" stroke-width="1"/>
  <text x="522" y="108" font-family="monospace" font-size="8" fill="#4B5563">localhost:3000/login</text>

  <!-- Browser viewport -->
  <rect x="440" y="122" width="360" height="378" fill="#0A0A12"/>

  <!-- Login form -->
  <rect x="516" y="156" width="208" height="248" rx="8" fill="#13131E" stroke="#1E2030" stroke-width="1"/>
  <text x="620" y="190" text-anchor="middle" font-family="monospace" font-size="12" fill="#F9FAFB" font-weight="bold">Sign In</text>
  <line x1="536" y1="200" x2="704" y2="200" stroke="#1E2030" stroke-width="1"/>

  <text x="536" y="222" font-family="monospace" font-size="8" fill="#6B7280">Email</text>
  <rect x="536" y="228" width="164" height="26" rx="4" fill="#0C0D14" stroke="#57B8FF" stroke-width="1.5"/>
  <text x="548" y="245" font-family="monospace" font-size="9" fill="#9CA3AF">alex@company.io</text>

  <text x="536" y="272" font-family="monospace" font-size="8" fill="#6B7280">Password</text>
  <rect x="536" y="278" width="164" height="26" rx="4" fill="#0C0D14" stroke="#374151" stroke-width="1"/>
  <text x="548" y="295" font-family="monospace" font-size="9" fill="#9CA3AF">&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;</text>

  <rect x="536" y="318" width="164" height="30" rx="4" fill="#57B8FF"/>
  <text x="618" y="337" text-anchor="middle" font-family="monospace" font-size="10" fill="#0C0D14" font-weight="bold">Sign In &#x2192;</text>

  <rect x="536" y="358" width="164" height="32" rx="4" fill="#0C0D14" stroke="#1E2030" stroke-width="1"/>
  <text x="618" y="378" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B5563">Sign in with Google</text>

  <!-- Playwright annotation overlay -->
  <rect x="448" y="392" width="196" height="18" rx="3" fill="#57B8FF" fill-opacity="0.08" stroke="#57B8FF" stroke-opacity="0.2" stroke-width="1"/>
  <text x="454" y="405" font-family="monospace" font-size="7.5" fill="#57B8FF">&#x25B6; locator('button').click()</text>

  <!-- Progress bar -->
  <rect x="448" y="420" width="336" height="3" rx="2" fill="#1E2030"/>
  <rect x="448" y="420" width="260" height="3" rx="2" fill="#57B8FF"/>
  <text x="448" y="436" font-family="monospace" font-size="8" fill="#6B7280">Running: auth.spec.ts &#x203A; login test</text>
  <rect x="650" y="448" width="60" height="18" rx="3" fill="#4ADE80" fill-opacity="0.12" stroke="#4ADE80" stroke-opacity="0.25" stroke-width="1"/>
  <text x="680" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ADE80">PASSED</text>
  <text x="448" y="466" font-family="monospace" font-size="8" fill="#374151">38ms &#x2022; Chromium</text>
  <text x="448" y="484" font-family="monospace" font-size="8" fill="#374151">Playwright v1.44 &#x2022; TypeScript</text>
</svg>
